{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>EchoClear</title>
     <link href="{% static 'assets/img/favicon.png' %}" rel="icon">
    <style>
        body { font-family: sans-serif; background-image: url("{% static 'assets/img/spark.jpg' %}");background-size: cover;text-align: center;padding: 50px;padding-top:180px;}
        .container { max-width:550px; margin: 60px auto; padding: 35px;text-align: center; border-radius: 20px; background: linear-gradient(rgba(229, 124, 233, 0.555),rgba(106,106,229,0.8)); -webkit-backdrop-filter: blur(15px); border:1px solid rgba(255,255,255,0.4); border-radius: 15px; box-shadow:0 10px 30px rgba(0,0,0,0.5);
            color:#ffffff; max-width: 508px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; border-radius: 5px; }
        </style>
        <body>
          <div class="container">
<h1>Your Secret Note is Ready!</h1>
<p>Share this link. It will work only ONCE:</p>

<input type="text" 
       value="{{ request.scheme }}://{{ request.get_host }}/view/{{ note_id }}/" 
       id="noteLink" readonly>

<button onclick="copyLink()">Copy Link</button>

<script>
function copyLink() {
  var copyText = document.getElementById("noteLink");
  copyText.select();
  navigator.clipboard.writeText(copyText.value);
  alert("Link copied to clipboard!");
}
</script>
</body>

<br><br>
<a href="{% url 'home' %}">Create another note</a>
<p>Thank you for visiting Have a nice day....</p>
</div>
